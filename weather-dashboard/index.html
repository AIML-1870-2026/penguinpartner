<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start: #0f172a;
      --bg-end: #1e3a5f;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.14);
      --accent: #38bdf8;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --error-bg: rgba(220,38,38,0.15);
      --error-border: rgba(220,38,38,0.4);
      --error-text: #fca5a5;
      --r: 14px;
      --r-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh;
      color: var(--text);
      line-height: 1.5;
      transition: background 1s ease;
    }

    .app {
      max-width: 620px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    /* Unit Toggle */
    .unit-toggle {
      display: flex;
      gap: 2px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 3px;
    }

    .unit-btn {
      padding: 0.3rem 0.8rem;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .unit-btn.active { background: var(--accent); color: #0f172a; }
    .unit-btn:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .unit-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Search */
    .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }

    .search-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .search-input:disabled { opacity: 0.6; }

    .search-btn {
      padding: 0.75rem 1.4rem;
      border-radius: var(--r-sm);
      border: none;
      background: var(--accent);
      color: #0f172a;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      min-width: 5.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-btn:hover:not(:disabled) { background: #7dd3fc; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .search-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Spinner (inline button) */
    .btn-spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(15,23,42,0.3);
      border-top-color: #0f172a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Error */
    .error-msg {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: var(--r-sm);
      color: var(--error-text);
      margin-bottom: 1.5rem;
    }

    .error-msg .icon { font-size: 1.1rem; flex-shrink: 0; }

    /* Loading */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 3rem;
      color: var(--muted);
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 4rem 2rem;
      color: var(--muted);
      text-align: center;
    }

    .empty-state .big-icon { font-size: 3.5rem; }

    /* Weather Card */
    .weather-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 1.75rem;
      backdrop-filter: blur(12px);
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.25rem;
    }

    .city-name { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
    .condition-text { color: var(--muted); font-size: 0.95rem; text-transform: capitalize; margin-top: 0.25rem; }
    .weather-icon { filter: drop-shadow(0 0 8px rgba(56,189,248,0.4)); }

    .temp-row {
      display: flex;
      align-items: baseline;
      gap: 1.25rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }

    .main-temp {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .feels-like { color: var(--muted); font-size: 0.95rem; }

    /* Details grid */
    .details-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 0.75rem 1rem;
    }

    .detail-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .detail-value { font-size: 1rem; font-weight: 600; }

    /* Forecast strip */
    .forecast-section {
      margin-top: 1.25rem;
      animation: fadeUp 0.3s ease 0.1s both;
    }

    .forecast-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .forecast-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
    }

    .forecast-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 0.75rem 0.4rem;
      text-align: center;
    }

    .forecast-day-name {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .forecast-icon { width: 44px; height: 44px; }

    .forecast-high { font-size: 0.95rem; font-weight: 700; }

    .forecast-low { font-size: 0.8rem; color: var(--muted); }

    /* Responsive */
    @media (max-width: 480px) {
      .app { padding: 1.25rem 0.75rem 3rem; }
      h1 { font-size: 1.25rem; }
      .main-temp { font-size: 3rem; }
      .details-grid { grid-template-columns: repeat(2, 1fr); }
      .city-name { font-size: 1.3rem; }
      .forecast-strip { grid-template-columns: repeat(5, minmax(60px, 1fr)); overflow-x: auto; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Weather Dashboard</h1>
    <div class="unit-toggle" role="group" aria-label="Temperature unit">
      <button class="unit-btn active" id="btn-c" aria-pressed="true" aria-label="Celsius" onclick="setUnit('C')">°C</button>
      <button class="unit-btn"        id="btn-f" aria-pressed="false" aria-label="Fahrenheit" onclick="setUnit('F')">°F</button>
    </div>
  </header>

  <form class="search-bar" role="search" onsubmit="handleSearch(event)">
    <input
      id="city-input"
      class="search-input"
      type="text"
      placeholder="Search for a city..."
      aria-label="City name"
      autocomplete="off"
    />
    <button type="submit" id="search-btn" class="search-btn" aria-label="Search weather">Search</button>
  </form>

  <div id="error-area"></div>
  <div id="main-area">
    <div class="empty-state">
      <p class="big-icon" aria-hidden="true">🌤</p>
      <p>Search for a city to see the current weather.</p>
    </div>
  </div>
  <div id="forecast-area"></div>
</div>

<script>
  const API_KEY = '86b954a419ca57a8007d0ae2016eab85';
  const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';
  const FORECAST_URL = 'https://api.openweathermap.org/data/2.5/forecast';

  let currentData = null;
  let forecastDays = null;
  let unit = localStorage.getItem('weatherUnit') || 'C';

  // Apply saved unit on load
  setUnit(unit, false);

  // ── Conversions ──────────────────────────────────────────
  function toF(c) { return (c * 9 / 5) + 32; }

  function fmtTemp(c) {
    const val = unit === 'F' ? toF(c) : c;
    return `${Math.round(val)}°${unit}`;
  }

  function fmtWind(ms) {
    return unit === 'F'
      ? `${(ms * 2.237).toFixed(1)} mph`
      : `${ms.toFixed(1)} m/s`;
  }

  function fmtVis(m) {
    return unit === 'F'
      ? `${(m / 1609.344).toFixed(1)} mi`
      : `${(m / 1000).toFixed(1)} km`;
  }

  function fmtTime(unix, tz) {
    const d = new Date((unix + tz) * 1000);
    const h = d.getUTCHours().toString().padStart(2, '0');
    const m = d.getUTCMinutes().toString().padStart(2, '0');
    return `${h}:${m}`;
  }

  // ── Unit toggle ──────────────────────────────────────────
  function setUnit(u, rerender = true) {
    unit = u;
    localStorage.setItem('weatherUnit', u);
    document.getElementById('btn-c').classList.toggle('active', u === 'C');
    document.getElementById('btn-f').classList.toggle('active', u === 'F');
    document.getElementById('btn-c').setAttribute('aria-pressed', u === 'C');
    document.getElementById('btn-f').setAttribute('aria-pressed', u === 'F');
    if (rerender && currentData) renderCard(currentData);
    if (rerender && forecastDays) renderForecast(forecastDays);
  }

  // ── Search ───────────────────────────────────────────────
  async function handleSearch(e) {
    e.preventDefault();
    const city = document.getElementById('city-input').value.trim();
    if (!city) return;

    setLoading(true);
    clearError();
    document.getElementById('forecast-area').innerHTML = '';

    try {
      const [weatherRes, forecastRes] = await Promise.all([
        fetch(`${BASE_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`),
        fetch(`${FORECAST_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`)
      ]);

      if (!weatherRes.ok) {
        if (weatherRes.status === 404) throw new Error('City not found. Please check the spelling and try again.');
        throw new Error(`Request failed (${weatherRes.status}). Please try again.`);
      }

      const data = await weatherRes.json();
      currentData = data;
      renderCard(data);

      if (forecastRes.ok) {
        const fData = await forecastRes.json();
        forecastDays = groupForecastByDay(fData.list);
        renderForecast(forecastDays);
      }
    } catch (err) {
      const msg = err.name === 'TypeError'
        ? 'Network error. Please check your internet connection.'
        : err.message;
      showError(msg);
      forecastDays = null;
      setBackground('default', false);
      setMainArea(`
        <div class="empty-state">
          <p class="big-icon" aria-hidden="true">🌤</p>
          <p>Search for a city to see the current weather.</p>
        </div>
      `);
    } finally {
      setLoading(false);
    }
  }

  // ── Render ───────────────────────────────────────────────
  function renderCard(d) {
    const cond = d.weather[0];
    const iconUrl = `https://openweathermap.org/img/wn/${cond.icon}@2x.png`;
    setBackground(cond.main, cond.icon.endsWith('n'));

    setMainArea(`
      <article class="weather-card" aria-label="Weather for ${esc(d.name)}, ${esc(d.sys.country)}">
        <div class="card-header">
          <div>
            <h2 class="city-name">${esc(d.name)}, ${esc(d.sys.country)}</h2>
            <p class="condition-text">${esc(cond.description)}</p>
          </div>
          <img class="weather-icon" src="${iconUrl}" alt="${esc(cond.description)}" width="80" height="80" />
        </div>

        <div class="temp-row">
          <span class="main-temp">${fmtTemp(d.main.temp)}</span>
          <span class="feels-like">Feels like ${fmtTemp(d.main.feels_like)}</span>
        </div>

        <div class="details-grid">
          ${detail('Humidity',  `${d.main.humidity}%`)}
          ${detail('Wind',      fmtWind(d.wind.speed))}
          ${detail('Visibility', fmtVis(d.visibility))}
          ${detail('Pressure',  `${d.main.pressure} hPa`)}
          ${detail('Sunrise',   fmtTime(d.sys.sunrise, d.timezone))}
          ${detail('Sunset',    fmtTime(d.sys.sunset,  d.timezone))}
        </div>
      </article>
    `);
  }

  function detail(label, value) {
    return `
      <div class="detail-item">
        <span class="detail-label">${label}</span>
        <span class="detail-value">${value}</span>
      </div>`;
  }

  // ── Dynamic background ───────────────────────────────────
  const THEMES = {
    thunderstorm:  { start: '#0a0a1a', end: '#1f1535', accent: '#a78bfa' },
    drizzle:       { start: '#1a2a3a', end: '#2d4a6a', accent: '#7dd3fc' },
    rain:          { start: '#0f2027', end: '#2c5364', accent: '#60a5fa' },
    snow:          { start: '#1a3050', end: '#5b9abf', accent: '#bae6fd' },
    atmosphere:    { start: '#2d3236', end: '#5a6473', accent: '#d1d5db' },
    clear_day:     { start: '#0c4a6e', end: '#d97706', accent: '#fbbf24' },
    clear_night:   { start: '#0f0c29', end: '#1e1b4b', accent: '#818cf8' },
    clouds_day:    { start: '#1e293b', end: '#475569', accent: '#94a3b8' },
    clouds_night:  { start: '#0f172a', end: '#1f2937', accent: '#6b7280' },
    default:       { start: '#0f172a', end: '#1e3a5f', accent: '#38bdf8' },
  };

  const ATMOSPHERE = new Set(['mist','smoke','haze','dust','fog','sand','ash','squall','tornado']);

  function getTheme(condition, isNight) {
    const c = condition.toLowerCase();
    if (c === 'thunderstorm') return THEMES.thunderstorm;
    if (c === 'drizzle')      return THEMES.drizzle;
    if (c === 'rain')         return THEMES.rain;
    if (c === 'snow')         return THEMES.snow;
    if (ATMOSPHERE.has(c))    return THEMES.atmosphere;
    if (c === 'clear')        return isNight ? THEMES.clear_night  : THEMES.clear_day;
    if (c === 'clouds')       return isNight ? THEMES.clouds_night : THEMES.clouds_day;
    return THEMES.default;
  }

  function setBackground(condition, isNight) {
    const t = getTheme(condition, isNight);
    document.body.style.background = `linear-gradient(135deg, ${t.start} 0%, ${t.end} 100%)`;
    document.documentElement.style.setProperty('--accent', t.accent);
  }

  // ── Forecast ─────────────────────────────────────────────
  function groupForecastByDay(list) {
    const today = new Date().toISOString().split('T')[0];
    const days = {};

    list.forEach(item => {
      const date = item.dt_txt.split(' ')[0];
      if (date === today) return;
      if (!days[date]) days[date] = { temps: [], icon: null, description: null };
      days[date].temps.push(item.main.temp);
      if (item.dt_txt.includes('12:00:00') || !days[date].icon) {
        days[date].icon = item.weather[0].icon;
        days[date].description = item.weather[0].description;
      }
    });

    return Object.entries(days).slice(0, 5).map(([date, d]) => ({
      date,
      high: Math.max(...d.temps),
      low: Math.min(...d.temps),
      icon: d.icon,
      description: d.description
    }));
  }

  function renderForecast(days) {
    const cards = days.map(d => {
      const dt = new Date(d.date + 'T12:00:00');
      const dayName = dt.toLocaleDateString('en-US', { weekday: 'short' });
      const iconUrl = `https://openweathermap.org/img/wn/${d.icon}@2x.png`;
      return `
        <div class="forecast-day">
          <span class="forecast-day-name">${dayName}</span>
          <img class="forecast-icon" src="${iconUrl}" alt="${esc(d.description)}" />
          <span class="forecast-high">${fmtTemp(d.high)}</span>
          <span class="forecast-low">${fmtTemp(d.low)}</span>
        </div>`;
    }).join('');

    document.getElementById('forecast-area').innerHTML = `
      <div class="forecast-section" aria-label="5-day forecast">
        <p class="forecast-title">5-Day Forecast</p>
        <div class="forecast-strip">${cards}</div>
      </div>`;
  }

  // ── Helpers ──────────────────────────────────────────────
  function setLoading(on) {
    const btn = document.getElementById('search-btn');
    const input = document.getElementById('city-input');
    btn.disabled = on;
    input.disabled = on;
    btn.innerHTML = on ? '<span class="btn-spinner" aria-hidden="true"></span>' : 'Search';
    if (on) {
      setMainArea(`
        <div class="loading-state" aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <p>Fetching weather…</p>
        </div>
      `);
    }
  }

  function showError(msg) {
    document.getElementById('error-area').innerHTML = `
      <div class="error-msg" role="alert" aria-live="polite">
        <span class="icon" aria-hidden="true">⚠</span>
        <p>${esc(msg)}</p>
      </div>`;
  }

  function clearError() {
    document.getElementById('error-area').innerHTML = '';
  }

  function setMainArea(html) {
    document.getElementById('main-area').innerHTML = html;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
